[package]
name = "otd"
version = "0.1.0"
edition = "2024"

publish = false

[dependencies]
axum = "~0.8"
tracing = "~0.1"
arc-swap = "~1.7"
mime_guess = "~2.0"
axum-server = "~0.7"
tracing-subscriber = "~0.3"
uuid = { version = "~1.17", features = ["v4"] }
tokio = { version = "~1.46", features = ["full"] }
tokio-util = { version = "~0.7", features = ["io"] }
serde = { version = "~1.0", features = ["derive"] }