[package]
name = "otd"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
zip = "~4.3"
smol = "~2.0"
toml = "~0.9"
tracing = "~0.1"
walkdir = "~2.5"
httparse = "~1.10"
serde_json = "~1.0"
tracing-subscriber = "~0.3"
uuid = { version = "~1.17", features = ["v4"] }
serde = { version = "~1.0", features = ["derive"] }

[dev-dependencies]
smol-macros = "~0.1"
macro_rules_attribute = "~0.2"
tempfile = "~3.14"